<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Admin Access</title>
    <style>
        :root { --primary: #1e293b; --accent: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
        }

        h1 { color: var(--primary); font-size: 1.5rem; margin-bottom: 20px; }

        /* New Styling for the Admin Logo */
        .admin-img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 50%; /* This makes it a circle */
            border: 3px solid #e2e8f0;
            margin-bottom: 25px;
            padding: 5px;
            background: white;
        }

        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        button:hover { background: #000; }
        .error { color: #ef4444; font-size: 0.85rem; margin-top: 10px; height: 1.2rem; }
        .back-link { display: block; margin-top: 20px; color: #64748b; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="login-card">
    <h1>Admin Portal</h1>
    
    <img src="adminlogo.png" alt="Admin Logo" class="admin-img">

    <input type="password" id="adminPassword" placeholder="Security Password">
    <button onclick="adminLogin()">Access Dashboard</button>
    <p id="errorMsg" class="error"></p>
    <a href="login.html" class="back-link">← Return to Main Login</a>
</div>

<script>
function adminLogin() {
    let password = document.getElementById("adminPassword").value;
    if(password === "admin123") {
        window.location.href = "admin.html";
    } else {  
        document.getElementById("errorMsg").innerText = "Unauthorized access attempt.";
    }
}
</script>
</body>
</html>
