<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grievance Management System</title>
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --bg: #f1f5f9; --success: #10b981; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; }
        .sidebar { width: 250px; background: var(--primary); color: white; height: 100vh; position: fixed; padding: 30px 20px; box-sizing: border-box; }
        .sidebar h2 { font-size: 1.2rem; border-bottom: 1px solid #334155; padding-bottom: 15px; margin-top: 0; }
        .content { margin-left: 250px; padding: 40px; width: calc(100% - 250px); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .table-container { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 15px; text-align: left; font-size: 0.8rem; text-transform: uppercase; color: #64748b; border-bottom: 1px solid #f1f5f9; }
        td { padding: 15px; border-top: 1px solid #f1f5f9; font-size: 0.9rem; color: #334155; }
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .pending { background: #fef3c7; color: #92400e; }
        .resolved { background: #dcfce7; color: #166534; }
        .btn-resolve { background: var(--accent); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
        #responseModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 400px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 10px; box-sizing: border-box; font-family: inherit; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Admin Console</h2>
    <p style="color: #94a3b8; font-size: 0.8rem;">University Management</p>
    <div style="margin-top: 40px;">
        <a href="login.html" style="color: #f87171; text-decoration: none; font-weight: 600;">Logout</a>
    </div>
</div>

<div class="content">
    <div class="header">
        <h1>Grievance Oversight</h1>
        <button onclick="clearAllData()" style="background: white; border: 1px solid #cbd5e1; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 0.8rem;">Clear All Records</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Student</th>
                    <th>Department</th>
                    <th>Complaint</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="adminTableBody"></tbody>
        </table>
    </div>
</div>

<div id="responseModal">
    <div class="modal-content">
        <h3 style="margin-top:0">Respond to Complaint</h3>
        <p id="targetStudent" style="font-weight: 600; color: var(--accent); margin-bottom: 5px;"></p>
        <textarea id="adminNote" rows="4" placeholder="Enter resolution details..."></textarea>
        <div style="margin-top: 20px; display: flex; gap: 10px;">
            <button onclick="saveResolution()" class="btn-resolve" style="padding: 10px 20px;">Send Response</button>
            <button onclick="closeModal()" style="background:#e2e8f0; border:none; padding:10px 20px; border-radius:6px; cursor:pointer;">Cancel</button>
        </div>
    </div>
</div>

<script>
    let currentEditIndex = null;

    function loadComplaints() {
        const complaints = JSON.parse(localStorage.getItem('allComplaints')) || [];
        const tbody = document.getElementById('adminTableBody');
        tbody.innerHTML = '';

        complaints.forEach((item, index) => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><strong>${item.name}</strong></td>
                <td>${item.dept}</td>
                <td style="max-width:250px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${item.msg}</td>
                <td><span class="status-badge ${item.status === 'Resolved' ? 'resolved' : 'pending'}">${item.status}</span></td>
                <td>
                    ${item.status === 'Pending' ? 
                    `<button class="btn-resolve" onclick="openModal(${index})">Resolve</button>` : 
                    `<span style="color:#10b981; font-weight:600;">Replied</span>`}
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    function openModal(index) {
        currentEditIndex = index;
        const complaints = JSON.parse(localStorage.getItem('allComplaints'));
        document.getElementById('targetStudent').innerText = complaints[index].name;
        document.getElementById('responseModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('responseModal').style.display = 'none';
        document.getElementById('adminNote').value = '';
    }

    function saveResolution() {
        const complaints = JSON.parse(localStorage.getItem('allComplaints'));
        const note = document.getElementById('adminNote').value;
        if(!note) return alert("Please enter a response.");

        complaints[currentEditIndex].status = "Resolved";
        complaints[currentEditIndex].adminNote = note;

        localStorage.setItem('allComplaints', JSON.stringify(complaints));
        closeModal();
        loadComplaints();
    }

    function clearAllData() {
        if(confirm("Permanently delete all records?")) {
            localStorage.removeItem('allComplaints');
            loadComplaints();
        }
    }

    window.onload = loadComplaints;
</script>
</body>
</html>
